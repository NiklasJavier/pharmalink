---
# connection.yaml for Pharmalink Network

# Name und Version des Connection Profiles
name: pharmalink-network
version: 1.0.0

# Client-spezifische Einstellungen, z.B. die eigene Organisation
client:
  organization: Org1MSP
  # Logging-Level für den Client
  logging:
    level: info
  # Standard-Timeouts für verschiedene Operationen (in Sekunden)
  connection:
    timeout:
      peer:
        endorser: '300'
      orderer: '300'

# Liste der Channels, die dieser Client verwenden kann
channels:
  # Unser Channel heißt 'pharmalink' (oder 'mychannel' im Standard)
  pharmalink:
    orderers:
      - orderer.example.com
    peers:
      peer0.org1.example.com:
        # Welche Rollen hat dieser Peer?
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true
      peer0.org2.example.com:
        endorsingPeer: true
        chaincodeQuery: true
        ledgerQuery: true

# Liste aller Organisationen im Netzwerk
organizations:
  Org1MSP:
    mspid: Org1MSP
    peers:
      - peer0.org1.example.com
    certificateAuthorities:
      - ca.org1.example.com

  Org2MSP:
    mspid: Org2MSP
    peers:
      - peer0.org2.example.com
    certificateAuthorities:
      - ca.org2.example.com

# Liste aller Orderer im Netzwerk
orderers:
  orderer.example.com:
    url: grpcs://localhost:7050
    # GRPC-Optionen, z.B. für TLS-Hostname-Überprüfung
    grpcOptions:
      ssl-target-name-override: orderer.example.com
    # Pfad zum TLS-Zertifikat des Orderers
    tlsCACerts:
      path: /pfad/zu/ihrem/projekt/fabric-samples/test-network/organizations/ordererOrganizations/example.com/orderers/orderer.example.com/msp/tlscacerts/tlsca.example.com-cert.pem

# Liste aller Peers im Netzwerk
peers:
  peer0.org1.example.com:
    url: grpcs://localhost:7051
    grpcOptions:
      ssl-target-name-override: peer0.org1.example.com
    tlsCACerts:
      path: /pfad/zu/ihrem/projekt/fabric-samples/test-network/organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt

  peer0.org2.example.com:
    url: grpcs://localhost:9051
    grpcOptions:
      ssl-target-name-override: peer0.org2.example.com
    tlsCACerts:
      path: /pfad/zu/ihrem/projekt/fabric-samples/test-network/organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls/ca.crt

# Liste der Certificate Authorities
certificateAuthorities:
  ca.org1.example.com:
    url: https://localhost:7054
    caName: ca-org1
    tlsCACerts:
      path: /pfad/zu/ihrem/projekt/fabric-samples/test-network/organizations/peerOrganizations/org1.example.com/ca/ca.org1.example.com-cert.pem
    # Name des Registrars für diese CA
    registrar:
      - name: admin
        pass: adminpw

  ca.org2.example.com:
    url: https://localhost:8054
    caName: ca-org2
    tlsCACerts:
      path: /pfad/zu/ihrem/projekt/fabric-samples/test-network/organizations/peerOrganizations/org2.example.com/ca/ca.org2.example.com-cert.pem
    registrar:
      - name: admin
        pass: adminpw