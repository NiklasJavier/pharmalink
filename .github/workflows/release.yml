name: Create Release and Push Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build, Push Docker Image and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up GraalVM for JDK 21 (Main Application)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'graalvm'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Main Application with Gradle
        run: ./gradlew build -PnewVersion=${{ github.ref_name }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # --- NEUE SCHRITTE ZUM BAUEN DER CHAINCODES ---
      - name: Set up JDK 11 for Chaincode Build
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin' # Ein Standard-JDK ist hier ausreichend

      - name: Dynamically Build Chaincodes
        run: |
          echo "--- Finding and building all chaincode projects ---"
          for project in $(find chaincode -mindepth 1 -maxdepth 1 -type d -name "pharmalink*"); do
            echo "--> Building ${project}"
            (cd "${project}" && ./gradlew build)
            if [ $? -ne 0 ]; then
              echo "::error::Gradle build failed for ${project}"
              exit 1
            fi
          done
      # --- ENDE DER NEUEN SCHRITTE ---

      - name: Package application for release
        run: |
          # Verzeichnisstruktur für das Release vorbereiten
          mkdir -p release-package/app
          mkdir -p release-package/chaincode

          echo "--- Packaging main application ---"
          cp -r build/quarkus-app/* release-package/app/
          cp -r scripts docker common release-package/
          
          echo "--- Packaging chaincode JARs ---"
          # Finde alle relevanten JARs und kopiere sie in den chaincode-Ordner des Pakets
          find chaincode -path "*/build/libs/*.jar" -exec cp {} release-package/chaincode/ \;

          echo "--- Final package structure ---"
          ls -R release-package

          # ZIP-Archiv erstellen
          cd release-package
          zip -r ../pharmalink-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          body: |
            Das Docker-Image wurde erfolgreich in die GitHub Container Registry (GHCR) gepusht.
            - **Image-Tags:** `${{ steps.meta.outputs.tags }}`
            - **Image-Details ansehen:** [GHCR-Pakete](https://github.com/${{ github.repository }}/packages)
            
            Zusätzlich ist die `pharmalink-${{ github.ref_name }}.zip` Datei als Asset direkt an dieses Release angehängt.
            Dieses Archiv enthält die Hauptanwendung sowie die gebauten Chaincode-JAR-Dateien im `/chaincode`-Verzeichnis.

          files: pharmalink-${{ github.ref_name }}.zip