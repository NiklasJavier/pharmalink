name: Create Release and Push Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build, Package, Push Docker Image and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up GraalVM for JDK 21 (Main Application)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'graalvm'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Main Application with Gradle
        run: ./gradlew build -PnewVersion=${{ github.ref_name }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up JDK 11 for Chaincode Build
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # === KORREKTUR: Setup, Build und Packaging in einem Schritt mit Debugging ===
      - name: Build and Package All Chaincodes
        run: |
          # Bricht das Skript sofort ab, wenn ein Befehl fehlschlägt
          set -e

          echo "--- Current directory: $(pwd) ---"

          # 1. Fabric CLI Tools herunterladen
          echo "--- Downloading Fabric CLI Tools ---"
          curl -sSL https://raw.githubusercontent.com/hyperledger/fabric/main/scripts/install-fabric.sh | bash -s -- --fabric-version 2.5.5 cli
          
          # 2. ÜBERPRÜFEN, ob die Installation erfolgreich war
          echo "--- Checking installation ---"
          ls -la
          if [ ! -d "bin" ] || [ ! -f "bin/peer" ]; then
            echo "::error::Fabric CLI download failed. 'bin/peer' not found."
            exit 1
          fi
          echo "'bin/peer' successfully found."

          # 3. Den Pfad für diesen Schritt explizit setzen
          export PATH="$(pwd)/bin:$PATH"
          
          # 4. ÜBERPRÜFEN, ob der PATH korrekt gesetzt wurde
          echo "--- Verifying system PATH ---"
          echo $PATH
          echo "--- Verifying 'peer' command can be found by the system ---"
          which peer # Dieser Befehl MUSS jetzt den Pfad zu 'peer' ausgeben

          # 5. Staging-Verzeichnis erstellen
          mkdir -p staging/chaincode-packages
          
          # 6. Alle Chaincode-Projekte bauen und verpacken
          echo "--- Finding, building, and packaging all chaincode projects ---"
          for project in $(find chaincode -mindepth 1 -maxdepth 1 -type d -name "pharmalink*"); do
            CC_NAME=$(basename ${project})
            CC_VERSION=$(echo "${{ github.ref_name }}" | sed 's/v//')
          
            echo "--> Building ${project} with Gradle"
            ./gradlew -p "${project}" build

            echo "--> Packaging ${CC_NAME} for Fabric"
            peer lifecycle chaincode package "staging/chaincode-packages/${CC_NAME}.tar.gz" --path "${project}" --lang java --label "${CC_NAME}_${CC_VERSION}"
          done

      - name: Package Application and Chaincodes for Release
        run: |
          mkdir -p release-package/app
          mkdir -p release-package/chaincode

          echo "--- Packaging main application ---"
          cp -r build/quarkus-app/* release-package/app/
          cp -r scripts docker common release-package/
          
          echo "--- Packaging Fabric chaincodes (.tar.gz) ---"
          cp -r staging/chaincode-packages/*.tar.gz release-package/chaincode/

          echo "--- Final package structure ---"
          ls -R release-package

          cd release-package
          zip -r ../pharmalink-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          body: |
            Das Docker-Image wurde erfolgreich in die GitHub Container Registry (GHCR) gepusht.
            - **Image-Tags:** `${{ steps.meta.outputs.tags }}`
            - **Image-Details ansehen:** [GHCR-Pakete](https://github.com/${{ github.repository }}/packages)
            
            Zusätzlich ist die `pharmalink-${{ github.ref_name }}.zip` Datei als Asset direkt an dieses Release angehängt.
            Dieses Archiv enthält die Hauptanwendung sowie die für Fabric verpackten Chaincodes (`.tar.gz`) im `/chaincode`-Verzeichnis.

          files: pharmalink-${{ github.ref_name }}.zip