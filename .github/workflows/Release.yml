name: Create Release and Push Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build, Push Docker Image and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up GraalVM for JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'graalvm'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew build -PnewVersion=${{ github.ref_name }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Package application for release
        run: |
          cd build/quarkus-app
          zip -r ../../pharmalink-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release ${{ github.ref_name }}
          body: |
            Das Docker-Image wurde erfolgreich in die GitHub Container Registry (GHCR) gepusht.
            - **Image-Tags:** `${{ steps.meta.outputs.tags }}`
            - **Image-Details ansehen:** [GHCR-Pakete](https://github.com/${{ github.repository }}/packages)
  
            Zusätzlich ist die `pharmalink-${{ github.ref_name }}.jar` Datei als Asset direkt an dieses Release angehängt.

          files: pharmalink-${{ github.ref_name }}.zip