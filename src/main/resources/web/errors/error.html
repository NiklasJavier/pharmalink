<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titleOverride != null ? titleOverride : T(de.jklein.pharmalink.constants.ErrorMessages).getTitleForCode(status)}">
        Fehler - PharmaLink
    </title>
    <link rel="stylesheet" th:href="@{/css/main.css}" /> <style>
    /* Modernere Typografie und globales Layout */
    body {
        font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        background-color: #eef2f5; /* Hellerer, weicherer Hintergrund */
        color: #4a4a4a;
        display: flex; /* Flexbox fürzentrierte Anordnung */
        justify-content: center;
        align-items: center;
        min-height: 100vh; /* Mindesthöhe des Viewports */
        margin: 0;
        padding: 20px; /* Etwas Polsterung am Rand */
        box-sizing: border-box; /* Padding im Element berücksichtigen */
        background-image: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); /* Sanfter Farbverlauf */
    }

    .container {
        background-color: #ffffff;
        border-radius: 12px; /* Stärker abgerundete Ecken */
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); /* Tieferer, weicherer Schatten */
        padding: 40px; /* Mehr Innenabstand */
        max-width: 600px;
        width: 100%; /* Passt sich besser an kleine Bildschirme an */
        text-align: center;
        position: relative; /* Für den Fehlercode-Hintergrund */
        overflow: hidden; /* Sicherstellen, dass nichts überläuft */
    }

    /* Hintergrund-Overlay für den Fehlercode */
    .error-code-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 10em; /* Sehr großer Fehlercode */
        font-weight: 800; /* Extra fett */
        color: rgba(189, 195, 199, 0.15); /* Sehr heller, transparenter Grauton */
        z-index: 0; /* Hinter dem Inhalt */
        pointer-events: none; /* Klick-Events ignorieren */
    }

    h1 {
        color: #e74c3c; /* Kräftiges Rot für Fehler */
        font-size: 2.8em; /* Größere Überschrift */
        margin-bottom: 15px;
        z-index: 1; /* Über dem Fehlercode-Hintergrund */
        position: relative;
    }

    p {
        font-size: 1.1em;
        line-height: 1.7;
        margin-bottom: 25px;
        color: #666;
        z-index: 1;
        position: relative;
    }

    a {
        color: #3498db; /* Helles Blau für Links */
        text-decoration: none;
        font-weight: 600; /* Fetterer Link */
        transition: color 0.2s ease-in-out; /* Sanfter Übergang beim Hover */
    }

    a:hover {
        color: #2980b9;
        text-decoration: underline;
    }

    .error-details {
        background-color: #f0f4f7; /* Hellerer Hintergrund für Details */
        border-left: 5px solid #e74c3c;
        padding: 20px; /* Mehr Polsterung */
        margin-top: 30px;
        border-radius: 8px; /* Abgerundete Ecken für Details */
        text-align: left;
        font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace; /* Monospace für Stacktrace */
        font-size: 0.9em;
        color: #555;
        white-space: pre-wrap; /* Behält Leerzeichen und Zeilenumbrüche bei */
        word-break: break-all;
        max-height: 200px; /* Begrenzt die Höhe des Stacktraces */
        overflow-y: auto; /* Scrollbar, wenn Inhalt zu lang */
    }

    .error-details strong {
        color: #e74c3c; /* Hebt Labels hervor */
    }

    /* Responsive Anpassungen */
    @media (max-width: 768px) {
        .container {
            padding: 25px;
            margin: 20px;
        }
        h1 {
            font-size: 2em;
        }
        .error-code-bg {
            font-size: 7em;
        }
    }
</style>
</head>
<body>
<div class="container">
    <div class="error-code-bg" th:text="${status}"></div>

    <h1 th:text="${titleOverride != null ? titleOverride : T(de.jklein.pharmalink.constants.ErrorMessages).getTitleForCode(status)}">
        Uups! Ein Fehler ist aufgetreten.
    </h1>

    <p th:text="${messageOverride != null ? messageOverride : T(de.jklein.pharmalink.constants.ErrorMessages).getMessageForCode(status)}">
        Entschuldigen Sie die Unannehmlichkeiten. Es gab ein Problem beim Verarbeiten Ihrer Anfrage.
    </p>

    <div th:if="${status}" class="error-details">
        <strong>Fehlercode:</strong> <span th:text="${status}"></span><br/>
        <th:block th:if="${@environment.acceptsProfiles('dev') or @environment.acceptsProfiles('test')}">
            <div th:if="${error}"><strong>Fehlertyp:</strong> <span th:text="${error}"></span><br/></div>
            <div th:if="${message}"><strong>Ursprüngliche Nachricht:</strong> <span th:text="${message}"></span><br/></div>
            <div th:if="${path}"><strong>Pfad:</strong> <span th:text="${path}"></span><br/></div>
            <div th:if="${timestamp}"><strong>Zeitstempel:</strong> <span th:text="${timestamp}"></span><br/></div>
            <div th:if="${trace}">
                <strong>Stacktrace:</strong>
                <pre th:text="${trace}"></pre>
            </div>
        </th:block>
    </div>

    <p>Kehren Sie zur <a th:href="@{/}" th:text="${T(de.jklein.pharmalink.constants.ErrorMessages).NAV_HOME}">Startseite</a> zurück.</p>
</div>
</body>
</html>
