<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="jsonDisplay(data, currentLevel)">
    <div th:if="${data instanceof T(java.util.Map)}" class="json-object"
         th:style="'margin-left:' + (currentLevel * 20) + 'px;'">
        <span th:if="${currentLevel > 0}" class="json-brace">{</span>
        <span th:unless="${currentLevel > 0}" class="json-object-root">JSON-Daten {</span>
        <div th:each="entry : ${data.entrySet()}" class="json-entry">
            <span class="json-key" th:text="${entry.key} + ':'"></span>
            <div th:if="${entry.value instanceof T(java.util.Map) or entry.value instanceof T(java.util.List)}"
                 th:replace="~{fragments/json-display-fragment :: jsonDisplay(data=${entry.value}, currentLevel=${currentLevel + 1})}"></div>
            <span th:unless="${entry.value instanceof T(java.util.Map) or entry.value instanceof T(java.util.List)}"
                  th:class="${entry.value instanceof T(java.lang.String) ? 'json-string' :
                            (entry.value instanceof T(java.lang.Number) ? 'json-number' :
                            (entry.value instanceof T(java.lang.Boolean) ? 'json-boolean' : 'json-value'))}"
                  th:text="${entry.value instanceof T(java.lang.String) ? '\'' + entry.value + '\'' : entry.value}"></span>
        </div>
        <span class="json-brace">}</span>
    </div>

    <div th:if="${data instanceof T(java.util.List)}" class="json-array"
         th:style="'margin-left:' + (currentLevel * 20) + 'px;'">
        <span class="json-brace">[</span>
        <div th:each="item : ${data}" class="json-item">
            <div th:if="${item instanceof T(java.util.Map) or item instanceof T(java.util.List)}"
                 th:replace="~{fragments/json-display-fragment :: jsonDisplay(data=${item}, currentLevel=${currentLevel + 1})}"></div>
            <span th:unless="${item instanceof T(java.util.Map) or item instanceof T(java.util.List)}"
                  th:class="${item instanceof T(java.lang.String) ? 'json-string' :
                            (item instanceof T(java.lang.Number) ? 'json-number' :
                            (item instanceof T(java.lang.Boolean) ? 'json-boolean' : 'json-value'))}"
                  th:text="${item instanceof T(java.lang.String) ? '\'' + item + '\'' : item}"></span>
        </div>
        <span class="json-brace">]</span>
    </div>

    <span th:if="${currentLevel == 0 and !(data instanceof T(java.util.Map)) and !(data instanceof T(java.util.List))}"
          th:class="${data instanceof T(java.lang.String) ? 'json-string' :
                    (data instanceof T(java.lang.Number) ? 'json-number' :
                    (data instanceof T(java.lang.Boolean) ? 'json-boolean' : 'json-value'))}"
          th:text="${data instanceof T(java.lang.String) ? '\'' + data + '\'' : data}"></span>
</div>

</body>
</html>
