<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="herstellerDetails">
    <h2>Hersteller-Übersicht</h2>
    <p>Hier ist die Rohdaten-Ansicht Ihrer erstellten Medikamente.</p>

    <div th:if="${medicationsAsJson}">
        <hr class="section-divider">
        <h3>Ihre Medikamente (JSON-Ansicht)</h3>

        <textarea readonly class="json-textarea" th:text="${medicationsAsJson}"></textarea>
    </div>

    <div th:if="${dashboardError}" class="error-message">
        <p th:text="${dashboardError}"></p>
    </div>

</div>

</body>
</html>

<style>
    .json-textarea {
        width: 100%;
        height: 300px;
        font-family: monospace;
        white-space: pre;
        overflow: auto;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 10px;
        background-color: #f5f5f5;
        resize: vertical;
    }
</style>
