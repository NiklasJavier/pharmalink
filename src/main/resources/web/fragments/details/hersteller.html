<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="herstellerDetails">
    <h2>Hersteller-Übersicht</h2>
    <p>Hier sehen Sie eine interaktive Ansicht Ihrer erstellten Medikamente.</p>

    <div th:if="${medikamenteAsJsonList != null and !medikamenteAsJsonList.isEmpty()}">
        <hr class="section-divider">
        <h3>Ihre Medikamente</h3>

        <div class="flex-container">
            <div th:each="jsonString, iterStat : ${medikamenteAsJsonList}"
                 th:id="'json-container-' + ${iterStat.index}"
                 class="json-container-item">
                <script th:id="'json-data-' + ${iterStat.index}" type="application/json" th:utext="${jsonString}"></script>
            </div>
        </div>
    </div>
</div>

</body>
</html>
