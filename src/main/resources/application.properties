spring.application.name=pharmalink

# ==================================
# Fabric Gateway Konfiguration
# ==================================

# MSP ID Ihrer Organisation
fabric.msp-id=Org1MSP
user.email=appuser@pharmalink.com
user.ipfs-link=12

# ==================================
# IPFS Konfiguration
# ==================================
ipfs.host=ipfs.io
ipfs.port=5001

# ABSOLUTER Pfad zum Crypto-Material von Org1 auf Ihrem Mac.
# Dies ist der wichtigste und fehleranfälligste Pfad.
# Passen Sie ihn an, falls Ihr "pharmalink" Projekt nicht direkt unter /Users/niklas/ liegt.
fabric.crypto-path=/Users/niklas/pharmalink/fabric-samples/test-network/organizations/peerOrganizations/org1.example.com

# Relativer Pfad zum Verzeichnis des Admin-Zertifikats
fabric.cert-path=users/Admin@org1.example.com/msp/signcerts
# Relativer Pfad zum Verzeichnis des privaten Admin-Schlüssels
fabric.key-dir-path=users/Admin@org1.example.com/msp/keystore
# Relativer Pfad zum TLS-Zertifikat des Peers
fabric.tls-cert-path=peers/peer0.org1.example.com/tls/ca.crt

# Netzwerk-Endpunkt des Peers, den Ihre Anwendung anspricht
fabric.peer.endpoint=node.d1.navine.tech:7051
# Der offizielle Name des Peers (wichtig für die TLS-Validierung)
fabric.peer.override-auth=peer0.org1.example.com

# Channel und Chaincode
fabric.channel-name=pharmalink
fabric.chaincode-name=pharmalink_chaincode_main

spring.profiles.active=dev