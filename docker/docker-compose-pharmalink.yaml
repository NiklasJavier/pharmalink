version: '3.7'

services:
  pharmalink-app:
    #image: ghcr.io/niklasjavier/pharmalink:latest
    build:
      context: ./../.
      dockerfile: Dockerfile
    container_name: app-pharmalink-app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      system.benutzername: "admin"
      system.passwort: "admin123"
    ports:
      - "8080:8080"
    volumes:
      - ../fabric-samples/test-network/organizations:/fabric-crypto/organizations:ro
      - ./pharmalink/application.yaml:/etc/pharmalink/application.yaml:ro
    networks:
      - pharmalink-net
    restart: unless-stopped
    depends_on:
      - postgres
      - ipfs

  pharmalink-ui:
    #image: ghcr.io/niklasjavier/pharmalink-ui:latest
    build:
      context: ./../frontend/.
      dockerfile: Dockerfile
    container_name: app-pharmalink-ui
    ports:
      - "3000:8083"
    volumes:
      - ./pharmalink-ui:/app/config:ro
    environment:
      - BACKEND_BASEURL=http://pharmalink-app:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - pharmalink-net
    depends_on:
      - pharmalink-app

  ipfs:
    image: ipfs/go-ipfs:latest
    container_name: app-ipfs_node
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    volumes:
      - ./pharmalink/ipfs/ipfs_data:/data/ipfs
      - ./pharmalink/ipfs/staging:/export
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "5001:5001"
      - "8081:8080"
    networks:
      - pharmalink-net

  postgres:
    image: postgres:17.5-alpine
    container_name: app-postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: pharmalinkdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pharmalink-net

networks:
  pharmalink-net:
    driver: bridge

volumes:
  postgres-data: