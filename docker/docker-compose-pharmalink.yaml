version: '3.7'

services:
  pharmalink-app:
    image: ghcr.io/niklasjavier/pharmalink:latest
    container_name: app-pharmalink
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - ../fabric-samples/test-network/organizations:/fabric-crypto/organizations:ro
      - ./pharmalink/application.yaml:/etc/pharmalink/application.yaml:ro
    networks:
      - pharmalink-net
    restart: unless-stopped
    depends_on:
      - postgres
      - ipfs

  postgres:
    image: postgres:17.5-alpine
    container_name: app-postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: pharmalinkdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pharmalink-net

networks:
  pharmalink-net:
    driver: bridge

volumes:
  postgres-data: