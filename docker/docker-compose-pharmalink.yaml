version: '3.7'

services:
  pharmalink-app:
    image: ghcr.io/niklasjavier/pharmalink:latest
    container_name: app-pharmalink
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    volumes:
      - ../fabric-samples/test-network/organizations:/fabric-crypto/organizations:ro
      - ./pharmalink/application.yaml.template:/etc/pharmalink/application.yaml.template:ro
    networks:
      - pharmalink-net
    restart: unless-stopped
    depends_on:
      - postgres
      - ipfs

  ipfs:
    image: ipfs/go-ipfs:latest
    container_name: app-ipfs_node
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    volumes:
      - ./pharmalink/ipfs/ipfs_data:/data/ipfs
      - ./pharmalink/ipfs/staging:/export
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "5001:5001"
      - "8081:8080"
    networks:
      - pharmalink-net

  postgres:
    image: postgres:17.5-alpine
    container_name: app-postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: pharmalinkdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pharmalink-net

networks:
  pharmalink-net:
    driver: bridge

volumes:
  postgres-data: