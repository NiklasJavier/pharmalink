---
################################################################################
#
#   ORGANIZATIONS
#
#   This section defines the organizational identities that can be referenced
#   in the configuration profiles.
#
################################################################################
Organizations:
  # OrdererOrg: Definiert die Orderer-Organisation
  - &OrdererOrg
    Name: OrdererOrg # Der Name, der im Channel-Config verwendet wird
    ID: OrdererMSP # Die MSP ID der Orderer-Organisation
    # MSPDir ist der Dateisystempfad, der die MSP-Konfiguration enthält.
    # Dieser Pfad ist relativ zum Speicherort der configtx.yaml
    MSPDir: ../organizations/ordererOrganizations/example.com/msp
    Policies: &OrdererOrgPolicies # Referenziert von unten für Konsistenz
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    # OrdererEndpoints ist eine Liste aller Orderer dieser Organisation,
    # mit denen Clients und Peers sich verbinden können.
    # Dies sind die Hostnamen/Ports, unter denen die Orderer erreichbar sind.
    OrdererEndpoints:
      - orderer.a-mfg.usa01.navine.tech:7050
      - orderer.b-whs.fin01.navine.tech:7050
      - orderer.c-aut.deu01.navine.tech:7050
      - orderer.d-phm.deu01.navine.tech:7050

  # Org1: Definiert die erste Peer-Organisation (z.B. auf Maschine 2)
  - &Org1
    Name: Org1MSP # Name im Channel
    ID: Org1MSP # MSP ID
    MSPDir: ../organizations/peerOrganizations/org1.example.com/msp
    Policies: &Org1Policies # Kann auch *SampleOrgPolicies verwenden, wenn keine spezifischen
      Readers:
        Type: Signature
        Rule: "OR('Org1MSP.admin', 'Org1MSP.peer', 'Org1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org1MSP.admin', 'Org1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org1MSP.peer')" # Standard für Peer-Organisationen


  # Org2: Definiert die zweite Peer-Organisation (z.B. auf Maschine 3)
  - &Org2
    Name: Org2MSP
    ID: Org2MSP
    MSPDir: ../organizations/peerOrganizations/org2.example.com/msp
    Policies: &Org2Policies # Kann auch *SampleOrgPolicies verwenden
      Readers:
        Type: Signature
        Rule: "OR('Org2MSP.admin', 'Org2MSP.peer', 'Org2MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org2MSP.admin', 'Org2MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org2MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org2MSP.peer')"


  # Org3: Definiert die dritte Peer-Organisation (z.B. auf Maschine 4, falls in deinem Projekt vorhanden)
  - &Org3
    Name: Org3MSP
    ID: Org3MSP
    MSPDir: ../organizations/peerOrganizations/org3.example.com/msp
    Policies: &Org3Policies # Kann auch *SampleOrgPolicies verwenden
      Readers:
        Type: Signature
        Rule: "OR('Org3MSP.admin', 'Org3MSP.peer', 'Org3MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org3MSP.admin', 'Org3MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org3MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org3MSP.peer')"


################################################################################
#
#   CAPABILITIES
#
#   This section defines the capabilities of fabric network.
#
################################################################################
Capabilities:
  Channel: &ChannelCapabilities
    # V3.0 for Channel ist erforderlich für Fabric 3.x Features
    V3_0: false

  Orderer: &OrdererCapabilities
    V2_0: true

  Application: &ApplicationCapabilities
    V2_5: true

################################################################################
#
#   APPLICATION
#
#   This section defines the values to encode into a config transaction or
#   genesis block for application-related parameters.
#
################################################################################
Application: &ApplicationDefaults
  ACLs: &ACLsDefault
    # Standard ACLs - können so bleiben, falls keine spezifischen Anpassungen benötigt werden
    _lifecycle/CheckCommitReadiness: /Channel/Application/Writers
    _lifecycle/CommitChaincodeDefinition: /Channel/Application/Writers
    _lifecycle/QueryChaincodeDefinition: /Channel/Application/Writers
    _lifecycle/QueryChaincodeDefinitions: /Channel/Application/Writers
    lscc/ChaincodeExists: /Channel/Application/Readers
    lscc/GetDeploymentSpec: /Channel/Application/Readers
    lscc/GetChaincodeData: /Channel/Application/Readers
    lscc/GetInstantiatedChaincodes: /Channel/Application/Readers
    qscc/GetChainInfo: /Channel/Application/Readers
    qscc/GetBlockByNumber: /Channel/Application/Readers
    qscc/GetBlockByHash: /Channel/Application/Readers
    qscc/GetTransactionByID: /Channel/Application/Readers
    qscc/GetBlockByTxID: /Channel/Application/Readers
    cscc/GetConfigBlock: /Channel/Application/Readers
    cscc/GetChannelConfig: /Channel/Application/Readers
    peer/Propose: /Channel/Application/Writers
    peer/ChaincodeToChaincode: /Channel/Application/Writers
    event/Block: /Channel/Application/Readers
    event/FilteredBlock: /Channel/Application/Readers

  Organizations: # Wird in den Profilen gefüllt
  Policies: &ApplicationDefaultPolicies
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"

  Capabilities:
    <<: *ApplicationCapabilities

################################################################################
#
#   ORDERER
#
#   This section defines the values to encode into a config transaction or
#   genesis block for orderer related parameters.
#
################################################################################
Orderer: &OrdererDefaults
  # Orderer Type: BFT für SmartBFT Konsensus
  OrdererType: BFT # <-- Ändern von etcdraft zu BFT

  # Adressen sind hier nicht mehr die primäre Konfiguration, da ConsenterMapping verwendet wird.
  Addresses:
  # - 127.0.0.1:7050 # Kann auskommentiert bleiben

  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 500
    AbsoluteMaxBytes: 10 MB
    PreferredMaxBytes: 2 MB
  MaxChannels: 0

  # ConsenterMapping enthält die Definition von Consenter-Identität, Endpunkten und Krypto-Material.
  # Dies ist für das BFT-Konsensusprotokoll notwendig.
  ConsenterMapping:
    - ID: 1
      Host: orderer.a-mfg.usa01.navine.tech
      Port: 7050
      MSPID: OrdererMSP
      # Pfade zu den Zertifikaten des Orderers auf der Kontrollmaschine,
      # relativ zum Ort, an dem configtxgen ausgeführt wird.
      Identity: ../organizations/ordererOrganizations/example.com/orderers/orderer.a-mfg.usa01.navine.tech/msp/signcerts/cert.pem # Überprüfe den genauen Dateinamen nach der Generierung
      ClientTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.a-mfg.usa01.navine.tech/tls/server.crt
      ServerTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.a-mfg.usa01.navine.tech/tls/server.crt
    - ID: 2
      Host: orderer.b-whs.fin01.navine.tech
      Port: 7050
      MSPID: OrdererMSP
      Identity: ../organizations/ordererOrganizations/example.com/orderers/orderer.b-whs.fin01.navine.tech/msp/signcerts/cert.pem
      ClientTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.b-whs.fin01.navine.tech/tls/server.crt
      ServerTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.b-whs.fin01.navine.tech/tls/server.crt
    - ID: 3
      Host: orderer.c-aut.deu01.navine.tech
      Port: 7050
      MSPID: OrdererMSP
      Identity: ../organizations/ordererOrganizations/example.com/orderers/orderer.c-aut.deu01.navine.tech/msp/signcerts/cert.pem
      ClientTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.c-aut.deu01.navine.tech/tls/server.crt
      ServerTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.c-aut.deu01.navine.tech/tls/server.crt
    - ID: 4
      Host: orderer.d-phm.deu01.navine.tech
      Port: 7050
      MSPID: OrdererMSP
      Identity: ../organizations/ordererOrganizations/example.com/orderers/orderer.d-phm.deu01.navine.tech/msp/signcerts/cert.pem
      ClientTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.d-phm.deu01.navine.tech/tls/server.crt
      ServerTLSCert: ../organizations/ordererOrganizations/example.com/orderers/orderer.d-phm.deu01.navine.tech/tls/server.crt

  Organizations: # Wird in den Profilen gefüllt
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"

  Capabilities:
    <<: *OrdererCapabilities

################################################################################
#
#   CHANNEL
#
#   This section defines the values to encode into a config transaction or
#   genesis block for channel related parameters.
#
################################################################################
Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"

  Capabilities:
    <<: *ChannelCapabilities

################################################################################
#
#   PROFILES
#
#   Different configuration profiles may be encoded here to be specified as
#   parameters to the configtxgen tool.
#
################################################################################
Profiles:
  # SampleAppChannelSmartBft defines an application channel configuration
  # that uses the Smart BFT orderer.
  ChannelUsingBFT: # Habe den Namen an deinen alten Fehler angelehnt
    <<: *ChannelDefaults
    Consortium: SampleConsortium # Wenn du ein Consortium hast
    Orderer:
      <<: *OrdererDefaults
      OrdererType: BFT # Explizit hier auf BFT setzen (überschreibt Standard von OrdererDefaults)
      BatchSize:
        MaxMessageCount: 5000
        AbsoluteMaxBytes: 10 MB
      SmartBFT:
        RequestBatchMaxInterval: 200ms
        RequestForwardTimeout: 5s
        RequestComplainTimeout: 20s
        RequestAutoRemoveTimeout: 3m0s
        ViewChangeResendInterval: 5s
        ViewChangeTimeout: 20s
        LeaderHeartbeatTimeout: 1m0s
        CollectTimeout: 1s
        IncomingMessageBufferSize: 200
        RequestPoolSize: 100000
        LeaderHeartbeatCount: 10
      Organizations:
        - *OrdererOrg # <-- Wichtig: Die Orderer-Org hier hinzufügen
      # Die ConsenterMapping-Details werden von *OrdererDefaults geerbt,
      # da sie dort bereits vollständig definiert sind.
      # Wenn du sie hier neu definieren willst, weil dieses Profil spezifische Consenter hat,
      # müsstest du den kompletten ConsenterMapping-Block hier einfügen.
      # Da du alle Orderer im Cluster aufgeführt hast, ist die Vererbung von OrdererDefaults passend.

    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Org1 # <-- Deine erste Peer-Org (auf Maschine 2)
        - *Org2 # <-- Deine zweite Peer-Org (auf Maschine 3)
        - *Org3 # <-- Deine dritte Peer-Org (auf Maschine 4)
      Capabilities: *ApplicationCapabilities