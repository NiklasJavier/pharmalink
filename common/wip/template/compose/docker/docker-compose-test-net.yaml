version: '3.7'
services:

  # Peer  Org Germany (de.navine.tech)
  peer0.de.navine.tech:
    container_name: peer0.de.navine.tech
    image: hyperledger/fabric-peer:latest
    labels:
      service: hyperledger-fabric
    environment:
      #Generic peer variables
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_test
      # Füge hier weitere Peer-Umgebungsvariablen aus vorherigen Schritten ein
      # wie z.B. CORE_PEER_ID, CORE_PEER_ADDRESS, CORE_PEER_LOCALMSPID etc.
    volumes:
      # Anpassung des Pfades für Peer-Konfiguration
      - ./docker/peercfg:/etc/hyperledger/peercfg
      - ${DOCKER_SOCK}:/host/var/run/docker.sock
      # Füge hier weitere Volume-Mounts für TLS-Zertifikate, MSPs und Ledger-Daten ein
      # wie z.B. - ../../../fabric-samples/organizations/peerOrganizations/de.navine.tech/peers/peer0.de.navine.tech:/etc/hyperledger/fabric
      # und - peer0.de.navine.tech:/var/hyperledger/production
    # networks und ports werden hier nicht genannt, da sie nicht Teil deiner
    # ursprünglichen Eingabe für diesen Abschnitt waren.
    # Denk daran, diese für einen funktionierenden Peer hinzuzufügen,
    # basierend auf den vorherigen Iterationen oder einem anderen Compose-File.

  # Peer  Org France (fr.navine.tech)
  peer0.fr.navine.tech:
    container_name: peer0.fr.navine.tech
    image: hyperledger/fabric-peer:latest
    labels:
      service: hyperledger-fabric
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_test
      # Füge hier weitere Peer-Umgebungsvariablen aus vorherigen Schritten ein
    volumes:
      - ./docker/peercfg:/etc/hyperledger/peercfg
      - ${DOCKER_SOCK}:/host/var/run/docker.sock
      # Füge hier weitere Volume-Mounts für TLS-Zertifikate, MSPs und Ledger-Daten ein

