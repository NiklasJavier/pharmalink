---
name: pharmalink-regulatory-${ORG_NAME_SHORT}
version: 1.0.0
client:
  organization: ${ORG_MSPID}
  connection:
    timeout:
      peer:
        endorser: '300'
organizations:
  ${ORG_MSPID}:
    mspid: ${ORG_MSPID}
    peers:
      - peer0.${ORG_DOMAIN}
    certificateAuthorities:
      - ca.${ORG_DOMAIN}
peers:
  peer0.${ORG_DOMAIN}:
    url: grpcs://localhost:${P0PORT}
    tlsCACerts:
      pem: |
        ${PEERPEM}
    grpcOptions:
      ssl-target-name-override: peer0.${ORG_DOMAIN}
      hostnameOverride: peer0.${ORG_DOMAIN}
certificateAuthorities:
  ca.${ORG_DOMAIN}:
    url: https://localhost:${CAPORT}
    caName: ca-${ORG_NAME_SHORT}
    tlsCACerts:
      pem:
        - |
          ${CAPEM}
    httpOptions:
      verify: false