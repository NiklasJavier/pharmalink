---
################################################################################
#
#   Section: Organizations
#
#   - This section defines the different organizational identities which will
#   be referenced later in the configuration.
#
################################################################################
Organizations:
  - &OrdererOrg
    Name: OrdererMSP
    ID: OrdererMSP
    MSPDir: organizations/ordererOrganizations/navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - orderer.navine.tech:7050

  - &RegDeOrg # Deutschland
    Name: RegDeMSP
    ID: RegDeMSP
    MSPDir: organizations/peerOrganizations/de.navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegDeMSP.admin', 'RegDeMSP.peer', 'RegDeMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegDeMSP.admin', 'RegDeMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegDeMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegDeMSP.peer')"

  - &RegFrOrg # Frankreich
    Name: RegFrMSP
    ID: RegFrMSP
    MSPDir: organizations/peerOrganizations/fr.navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegFrMSP.admin', 'RegFrMSP.peer', 'OR('RegFrMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegFrMSP.admin', 'RegFrMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegFrMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegFrMSP.peer')"

  - &RegBeOrg # Belgien
    Name: RegBeMSP
    ID: RegBeMSP
    MSPDir: organizations/peerOrganizations/be.navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegBeMSP.admin', 'RegBeMSP.peer', 'RegBeMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegBeMSP.admin', 'RegBeMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegBeMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegBeMSP.peer')"

  - &RegEsOrg # Spanien
    Name: RegEsMSP
    ID: RegEsMSP
    MSPDir: organizations/peerOrganizations/es.navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegEsMSP.admin', 'RegEsMSP.peer', 'RegEsMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegEsMSP.admin', 'RegEsMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegEsMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegEsMSP.peer')"

################################################################################
#
#   SECTION: Consortiums
#
#   - DIES IST DER KRITISCHE ABSCHNITT FÜR DIE EINRÜCKUNG!
#   - Er muss auf der GLEICHEN EINRÜCKUNGSEBENE wie 'Organizations' liegen.
#
################################################################################
Consortiums: # <--- HIER AUF DER TOP-LEVEL, OHNE EINRÜCKUNG!
  PharmaLinkConsortium: # <--- Zwei Leerzeichen Einrückung
    Organizations:      # <--- Vier Leerzeichen Einrückung
      - *RegDeOrg
      - *RegFrOrg
      - *RegBeOrg
      - *RegEsOrg

################################################################################
#
#   SECTION: Capabilities
#
#   - Muss ebenfalls auf der TOP-LEVEL liegen.
#
################################################################################
Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true
################################################################################
#
#   SECTION: Application
#
################################################################################
Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities
################################################################################
#
#   SECTION: Orderer
#
################################################################################
Orderer: &OrdererDefaults
  Addresses:
    - orderer.navine.tech:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
################################################################################
#
#   CHANNEL
#
################################################################################
Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities
################################################################################
#
#   Profile
#
################################################################################
Profiles:
  ChannelUsingRaft: # Dies ist das Profil, das für die Kanalkreation verwendet wird
    <<: *ChannelDefaults
    Consortium: PharmaLinkConsortium # MUSS mit dem Namen übereinstimmen, den du in der Consortiums-Sektion gewählt hast!

    Orderer:
      <<: *OrdererDefaults
      OrdererType: etcdraft
      EtcdRaft:
        Consenters:
          - Host: orderer.navine.tech
            Port: 7050
            ClientTLSCert: organizations/ordererOrganizations/navine.tech/orderers/orderer.navine.tech/tls/server.crt
            ServerTLSCert: organizations/ordererOrganizations/navine.tech/orderers/orderer.navine.tech/tls/server.crt
      Organizations:
        - *OrdererOrg
      Capabilities: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *RegDeOrg
        - *RegFrOrg
        - *RegBeOrg
        - *RegEsOrg
      Capabilities: *ApplicationCapabilities