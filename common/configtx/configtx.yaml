---
################################################################################
#
#   Section: Organizations
#
#   - This section defines the different organizational identities which will
#   be referenced later in the configuration.
#
################################################################################
Organizations:
  - &OrdererOrg
    Name: OrdererMSP
    ID: OrdererMSP
    # Angepasster MSPDir-Pfad für den Orderer.
    # Wichtig: Dieser Pfad ist relativ zum FABRIC_CFG_PATH, der in network.sh gesetzt wird.
    MSPDir: organizations/ordererOrganizations/navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - orderer.navine.tech:7050 # Angepasste Orderer-Domain

  - &RegDeOrg # Deutschland
    Name: RegDeMSP
    ID: RegDeMSP
    MSPDir: organizations/peerOrganizations/de.navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegDeMSP.admin', 'RegDeMSP.peer', 'RegDeMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegDeMSP.admin', 'RegDeMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegDeMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegDeMSP.peer')"

  - &RegFrOrg # Frankreich
    Name: RegFrMSP
    ID: RegFrMSP
    MSPDir: organizations/peerOrganizations/fr.navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegFrMSP.admin', 'RegFrMSP.peer', 'OR('RegFrMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegFrMSP.admin', 'RegFrMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegFrMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegFrMSP.peer')"

  - &RegBeOrg # Belgien
    Name: RegBeMSP
    ID: RegBeMSP
    MSPDir: organizations/peerOrganizations/be.navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegBeMSP.admin', 'RegBeMSP.peer', 'RegBeMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegBeMSP.admin', 'RegBeMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegBeMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegBeMSP.peer')"

  - &RegEsOrg # Spanien
    Name: RegEsMSP
    ID: RegEsMSP
    MSPDir: organizations/peerOrganizations/es.navine.tech/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegEsMSP.admin', 'RegEsMSP.peer', 'RegEsMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegEsMSP.admin', 'RegEsMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegEsMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegEsMSP.peer')"

################################################################################
#
#   SECTION: Consortiums
#
#   - DIES IST DER NEUE ODER KORRIGIERTE ABSCHNITT!
#   - Hier definierst du deine Konsortien. Ein Konsortium ist eine Liste von
#     Organisationen, die auf diesem Ordering Service Kanäle erstellen dürfen.
#   - Der Name des Konsortiums (hier "PharmaLinkConsortium") wird später im
#     Kanalprofil referenziert.
#
################################################################################
Consortiums:
  PharmaLinkConsortium: # Wähle einen aussagekräftigen Namen für dein Konsortium
    Organizations:
      - *RegDeOrg # Alle Peer-Organisationen, die Teil dieses Konsortiums sind
      - *RegFrOrg
      - *RegBeOrg
      - *RegEsOrg

################################################################################
#
#   SECTION: Capabilities
#
#   - This section defines the capabilities of fabric network.
#
################################################################################
Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true
################################################################################
#
#   SECTION: Application
#
#   - This section defines the values to encode into a config transaction or
#   genesis block for application related parameters
#
################################################################################
Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities
################################################################################
#
#   SECTION: Orderer
#
#   - This section defines the values to encode into a config transaction or
#   genesis block for orderer related parameters
#
################################################################################
Orderer: &OrdererDefaults
  # Angepasste Orderer-Adresse
  Addresses:
    - orderer.navine.tech:7050
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
################################################################################
#
#   CHANNEL
#
#   This section defines the values to encode into a config transaction or
#   genesis block for channel related parameters.
#
################################################################################
Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities
################################################################################
#
#   Profile
#
#   - Different configuration profiles may be encoded here to be specified
#   as parameters to the configtxgen tool
#
################################################################################
Profiles:
  ChannelUsingRaft: # Dies ist das Profil, das für die Kanalkreation verwendet wird
    <<: *ChannelDefaults
    # HIER IST DIE KRITISCHE NEUE ZEILE!
    Consortium: PharmaLinkConsortium # MUSS mit dem Namen übereinstimmen, den du in der Consortiums-Sektion gewählt hast!

    Orderer:
      <<: *OrdererDefaults
      OrdererType: etcdraft
      EtcdRaft:
        Consenters:
          - Host: orderer.navine.tech # Angepasste Orderer-Domain
            Port: 7050
            # Angepasste TLS-Zertifikatspfade. Annahme: relativ zum FABRIC_CFG_PATH
            ClientTLSCert: organizations/ordererOrganizations/navine.tech/orderers/orderer.navine.tech/tls/server.crt
            ServerTLSCert: organizations/ordererOrganizations/navine.tech/orderers/orderer.navine.tech/tls/server.crt
      Organizations:
        - *OrdererOrg
      Capabilities: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *RegDeOrg # Hinzugefügt: Deutschland
        - *RegFrOrg # Hinzugefügt: Frankreich
        - *RegBeOrg # Hinzugefügt: Belgien
        - *RegEsOrg # Hinzugefügt: Spanien
      Capabilities: *ApplicationCapabilities

  # Optional: Ein separates Profil für den Genesis-Block des Systems (falls nicht 'ChannelUsingRaft' verwendet wird)
  # Dies ist das Profil, das network.sh für den system-genesis-block verwenden könnte,
  # wenn network.sh nicht das ChannelUsingRaft-Profil direkt dafür nimmt.
  # OrdererGenesis: # Beispiel für ein System-Channel-Genesis-Block-Profil
  #   <<: *ChannelDefaults
  #   Orderer:
  #     <<: *OrdererDefaults
  #     OrdererType: etcdraft
  #     EtcdRaft:
  #       Consenters:
  #         - Host: orderer.navine.tech
  #           Port: 7050
  #           ClientTLSCert: organizations/ordererOrganizations/navine.tech/orderers/orderer.navine.tech/tls/server.crt
  #           ServerTLSCert: organizations/ordererOrganizations/navine.tech/orderers/orderer.navine.tech/tls/server.crt
  #     Organizations:
  #       - *OrdererOrg
  #     Capabilities: *OrdererCapabilities
  #   Application:
  #     <<: *ApplicationDefaults
  #     Organizations: # Keine Anwendungsorganisationen im Systemkanal
  #     Capabilities: *ApplicationCapabilities