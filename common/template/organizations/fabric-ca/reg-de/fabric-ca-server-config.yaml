# fabric-ca/reg-de/fabric-ca-server-config.yaml
# Konfiguration für die deutsche Regulatory CA

version: 1.2.0

port: 7054 # Dieser Port wird üblicherweise per Umgebungsvariable überschrieben (z.B. 7054 in Docker Compose)
debug: false
crlsizelimit: 512000

tls:
  enabled: true
  certfile:
  keyfile:
  clientauth:
    type: noclientcert
    certfiles:

ca:
  name: ca-reg-de # Eindeutiger Name für diese CA (Deutschland)
  keyfile:
  certfile:
  chainfile:

crl:
  expiry: 24h

registry:
  maxenrollments: -1
  identities:
    - name: admin
      pass: adminpw
      type: client
      affiliation: ""
      attrs:
        hf.Registrar.Roles: "*"
        hf.Registrar.DelegateRoles: "*"
        hf.Revoker: true
        hf.IntermediateCA: true
        hf.GenCRL: true
        hf.Registrar.Attributes: "*"
        hf.AffiliationMgr: true

db:
  type: sqlite3
  datasource: fabric-ca-server.db
  tls:
    enabled: false
    certfiles:
    client:
      certfile:
      keyfile:

ldap:
  enabled: false
  url: ldap://<adminDN>:<adminPassword>@<host>:<port>/<base>
  tls:
    certfiles:
    client:
      certfile:
      keyfile:
  attribute:
    names: ['uid','member']
    converters:
      - name:
        value:
    maps:
      groups:
        - name:
          value:

affiliations:
  # Affiliation für die deutsche Organisation
  de.navine.tech: [] # Haupt-Affiliation für die deutsche Regulatory Domain (de.navine.tech)

signing:
  default:
    usage:
      - digital signature
    expiry: 8760h
  profiles:
    ca:
      usage:
        - cert sign
        - crl sign
      expiry: 43800h
      caconstraint:
        isca: true
        maxpathlen: 0
    tls:
      usage:
        - signing
        - key encipherment
        - server auth
        - client auth
        - key agreement
      expiry: 8760h

csr:
  cn: ca.de.navine.tech # Common Name des Root-CA-Zertifikats für Deutschland
  names:
    - C: DE # Land: Deutschland
      ST: "Rhineland-Palatinate" # Staat/Region: Rheinland-Pfalz
      L: "Mainz" # Ort: Landau
      O: de.navine.tech # Organisation: Die Domain der deutschen Regulatory Org
      OU: PeerOrg # Organisatorische Einheit: Für Peer-Organisationen
  hosts:
    - localhost
    - 127.0.0.1
    - 0.0.0.0
    - ca_reg_de # Docker Container Name der deutschen CA
    - de.navine.tech # Domain der deutschen Regulatory Org
  ca:
    expiry: 131400h
    pathlength: 1

bccsp:
  default: SW
  sw:
    hash: SHA2
    security: 256
    filekeystore:
      keystore: msp/keystore

cacount:

cafiles:

intermediate:
  parentserver:
    url:
    caname:

  enrollment:
    hosts:
    profile:
    label:

  tls:
    certfiles:
    client:
      certfile:
      keyfile: