#############################################################################
#   This is a configuration file for the fabric-ca-server command.
#
#   COMMAND LINE ARGUMENTS AND ENVIRONMENT VARIABLES
#   ------------------------------------------------
#   Each configuration element can be overridden via command line
#   arguments or environment variables.  The precedence for determining
#   the value of each element is as follows:
#   1) command line argument
#      Examples:
#      a) --port 443
#         To set the listening port
#      b) --ca.keyfile ../mykey.pem
#         To set the "keyfile" element in the "ca" section below;
#         note the '.' separator character.
#   2) environment variable
#      Examples:
#      a) FABRIC_CA_SERVER_PORT=443
#         To set the listening port
#      b) FABRIC_CA_SERVER_CA_KEYFILE="../mykey.pem"
#         To set the "keyfile" element in the "ca" section below;
#         note the '_' separator character.
#   3) configuration file
#   4) default value (if there is one)
#      All default values are shown beside each element below.
#
#   FILE NAME ELEMENTS
#   ------------------
#   The value of all fields whose name ends with "file" or "files" are
#   name or names of other files.
#   For example, see "tls.certfile" and "tls.clientauth.certfiles".
#   The value of each of these fields can be a simple filename, a
#   relative path, or an an absolute path.  If the value is not an
#   absolute path, it is interpretted as being relative to the location
#   of this configuration file.
#
#############################################################################

# Version of config file
version: 1.2.0

# Server's listening port (default: 7054)
port: 7054 # Dieser Port wird üblicherweise per Umgebungsvariable überschrieben (FABRIC_CA_SERVER_PORT)

# Enables debug logging (default: false)
debug: false

# Size limit of an acceptable CRL in bytes (default: 512000)
crlsizelimit: 512000

#############################################################################
#  TLS section for the server's listening port
#
#  The following types are supported for client authentication: NoClientCert,
#  RequestClientCert, RequireAnyClientCert, VerifyClientCertIfGiven,
#  and RequireAndVerifyClientCert.
#
#  Certfiles is a list of root certificate authorities that the server uses
#  when verifying client certificates.
#############################################################################
tls:
  # Enable TLS (default: false)
  enabled: true
  # TLS for the server's listening port
  certfile: # Pfad wird normalerweise in Docker Compose gemappt
  keyfile: # Pfad wird normalerweise in Docker Compose gemappt
  clientauth:
    type: noclientcert
    certfiles:

#############################################################################
#  The CA section contains information related to the Certificate Authority
#  including the name of the CA, which should be unique for all members
#  of a blockchain network.  It also includes the key and certificate files
#  used when issuing enrollment certificates (ECerts) and transaction
#  certificates (TCerts).
#  The chainfile (if it exists) contains the certificate chain which
#  should be trusted for this CA, where the 1st in the chain is always the
#  root CA certificate.
#############################################################################
ca:
  # Name of this CA (Dieser Wert wird pro CA-Instanz angepasst)
  name: ca-orgname # Platzhalter: Wird in der Kopie der Datei spezifisch gesetzt (z.B. ca-orderer, ca-reg-de)
  keyfile: # Pfad wird normalerweise in Docker Compose gemappt
  certfile: # Pfad wird normalerweise in Docker Compose gemappt
  chainfile:

#############################################################################
#  The gencrl REST endpoint is used to generate a CRL that contains revoked
#  certificates. This section contains configuration options that are used
#  during gencrl request processing.
#############################################################################
crl:
  # Specifies expiration for the generated CRL. The number of hours
  # specified by this property is added to the UTC time, the resulting time
  # is used to set the 'Next Update' date of the CRL.
  expiry: 24h

#############################################################################
#  The registry section controls how the fabric-ca-server does two things:
#  1) authenticates enrollment requests which contain a username and password
#     (also known as an enrollment ID and secret).
#  2) once authenticated, retrieves the identity's attribute names and
#     values which the fabric-ca-server optionally puts into TCerts
#     which it issues for transacting on the Hyperledger Fabric blockchain.
#     These attributes are useful for making access control decisions in
#     chaincode.
#  There are two main configuration options:
#  1) The fabric-ca-server is the registry.
#     This is true if "ldap.enabled" in the ldap section below is false.
#  2) An LDAP server is the registry, in which case the fabric-ca-server
#     calls the LDAP server to perform these tasks.
#     This is true if "ldap.enabled" in the ldap section below is true,
#     which means this "registry" section is ignored.
#############################################################################
registry:
  # Maximum number of times a password/secret can be reused for enrollment
  # (default: -1, which means there is no limit)
  maxenrollments: -1

  # Contains identity information which is used when LDAP is disabled
  identities:
    # Diese Identität (admin) ist nur für das Bootstrapping der CA selbst da.
    # Die eigentlichen Org-Admins und Peers werden durch 'registerEnroll.sh' registriert.
    - name: admin
      pass: adminpw
      type: client
      affiliation: "" # Die Affiliation kann hier weggelassen oder spezifisch gesetzt werden
      attrs:
        hf.Registrar.Roles: "*"
        hf.Registrar.DelegateRoles: "*"
        hf.Revoker: true
        hf.IntermediateCA: true
        hf.GenCRL: true
        hf.Registrar.Attributes: "*"
        hf.AffiliationMgr: true

#############################################################################
#  Database section
#  Supported types are: "sqlite3", "postgres", and "mysql".
#  The datasource value depends on the type.
#  If the type is "sqlite3", the datasource value is a file name to use
#  as the database store.  Since "sqlite3" is an embedded database, it
#  may not be used if you want to run the fabric-ca-server in a cluster.
#  To run the fabric-ca-server in a cluster, you must choose "postgres"
#  or "mysql".
#############################################################################
db:
  type: sqlite3
  # Die Datenbankdatei wird pro CA-Instanz in ihrem Volume abgelegt
  datasource: fabric-ca-server.db # Dies ist ein relativer Pfad innerhalb des CA-Containers
  tls:
    enabled: false
    certfiles:
    client:
      certfile:
      keyfile:

#############################################################################
#  LDAP section (unverändert)
#############################################################################
ldap:
  enabled: false
  url: ldap://<adminDN>:<adminPassword>@<host>:<port>/<base>
  tls:
    certfiles:
    client:
      certfile:
      keyfile:
  attribute:
    names: ['uid','member']
    converters:
      - name:
        value:
    maps:
      groups:
        - name:
          value:

#############################################################################
# Affiliations section.
# Die Affiliations müssen pro CA-Instanz spezifisch konfiguriert werden.
# Dies kann hier als Platzhalter belassen oder in den spezifischen Kopien
# der Datei direkt definiert werden.
#############################################################################
affiliations:
# Beispiel: orgname: []
# Wird in spezifischen Dateien für jede Org gefüllt
# z.B. für RegDeOrg:
#   de.navine.tech: []
#   oder spezifischere Unter-Affiliations:
#   de.navine.tech:
#     - sales
#     - marketing

#############################################################################
#  Signing section (unverändert)
#############################################################################
signing:
  default:
    usage:
      - digital signature
    expiry: 8760h
  profiles:
    ca:
      usage:
        - cert sign
        - crl sign
      expiry: 43800h
      caconstraint:
        isca: true
        maxpathlen: 0
    tls:
      usage:
        - signing
        - key encipherment
        - server auth
        - client auth
        - key agreement
      expiry: 8760h

###########################################################################
#  Certificate Signing Request (CSR) section.
#  Diese Sektion definiert, wie die Root-CA-Zertifikate selbst generiert werden.
#  Die Werte hier müssen pro CA-Instanz spezifisch sein (z.B. für Orderer vs. Peers).
#  Sie werden hier als Platzhalter belassen und sollten in den jeweiligen
#  cfssl JSON-Dateien (ca-orderer.json, ca-peer.json) definiert werden,
#  die cfssl zum Initialisieren der CA verwendet.
#  Daher ist dieser Block hier in der Regel nur eine generische Referenz.
###########################################################################
csr:
  cn: ca.example.com # Wird von cfssl gencert -initca überschrieben
  names:
    - C: US # Wird von cfssl gencert -initca überschrieben
      ST: "New York"
      L: "New York"
      O: example.com
      OU:
  hosts:
    - localhost # Wird von cfssl gencert -initca überschrieben
    - example.com
  ca:
    expiry: 131400h
    pathlength: 1

#############################################################################
# BCCSP (BlockChain Crypto Service Provider) section (unverändert)
#############################################################################
bccsp:
  default: SW
  sw:
    hash: SHA2
    security: 256
    filekeystore:
      keystore: msp/keystore

#############################################################################
# Multi CA section (unverändert, da wir mehrere separate CA-Container nutzen)
#############################################################################

cacount:

cafiles:

#############################################################################
# Intermediate CA section (unverändert, da wir von Root-CAs ausgehen)
#############################################################################
intermediate:
  parentserver:
    url:
    caname:

  enrollment:
    hosts:
    profile:
    label:

  tls:
    certfiles:
    client:
      certfile:
      keyfile: